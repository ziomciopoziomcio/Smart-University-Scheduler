name: Backend CI
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
jobs:
  lint:
    name: Lint Code
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      - name: Install linters
        run: pip install black==26.3.1 ruff==0.3.2

      - name: Run Black
        run: black backend/ --check

      - name: Run Ruff
        run: ruff check backend/

  test-and-build:
    runs-on: ubuntu-latest
    needs: lint
    env:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: smart_scheduler_db
      CORS_ORIGINS: http://localhost:3000
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Build docker containers
        run: |
          cd infrastructure/docker
          docker compose build backend

      - name: Start test database
        run: |
          cd infrastructure/docker
          docker compose up -d postgres
          sleep 5

      - name: Run Alembic migrations
        run: |
          cd infrastructure/docker
          docker compose run --rm backend alembic upgrade head

      # Place for backend tests here - Pytest, etc.

      - name: End of CI workflow
        run: echo "Backend CI workflow completed successfully!"
