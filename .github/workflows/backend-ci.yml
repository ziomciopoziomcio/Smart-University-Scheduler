name: Backend CI
on:
    push:
        branches: ["main"]
    pull_request:
        branches: ["main"]
jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build docker containers
        run: |
          cd infrastructure/docker
          docker compose build backend
          
      # Place for backend tests here - Pytest, etc.

      - name: End of CI workflow
        run: echo "Backend CI workflow completed successfully!"
