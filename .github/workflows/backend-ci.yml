name: Backend CI
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
jobs:
  lint:
    name: Lint Code
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Install linters
        run: pip install black ruff

      - name: Run Black
        run: black backend/ --check

      - name: Run Ruff
        run: ruff check backend/

  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build docker containers
        run: |
          cd infrastructure/docker
          docker compose build backend

      # Place for backend tests here - Pytest, etc.

      - name: End of CI workflow
        run: echo "Backend CI workflow completed successfully!"
