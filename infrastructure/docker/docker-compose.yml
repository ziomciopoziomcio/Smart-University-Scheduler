services:
  # postgres service for the database
  postgres:
    image: postgres:15-alpine
    container_name: smart_scheduler_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # pgadmin service for database management
  pgadmin:
    image: dpage/pgadmin4
    container_name: smart_scheduler_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres

  # graph DB
  neo4j:
    image: neo4j:5.15.0
    container_name: smart_scheduler_neo4j
    restart: unless-stopped
    environment:
      NEO4J_AUTH: "neo4j/${NEO4J_PASSWORD}"
      NEO4J_PLUGINS: '["graph-data-science"]'
    ports:
      - "7474:7474" # HTTP
      - "7687:7687" # Bolt
    volumes:
      - neo4j_data:/data

  # KAFKA
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: smart_scheduler_zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: smart_scheduler_kafka
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    ports:
      - "9092:9092"

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: smart_scheduler_kafka_ui
    depends_on:
      - kafka
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
    ports:
      - "8080:8080"

  # backend service for the application API
  backend:
    build:
      context: ../../backend
    container_name: smart_scheduler_backend_API
    restart: unless-stopped
    environment:
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      #NEO4J_HOST: ${NEO4J_HOST}
      CORS_ORIGINS: ${CORS_ORIGINS}
      KAFKA_URL: "kafka:29092"
      SECRET_KEY: ${SECRET_KEY}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      SMTP_FROM: ${SMTP_FROM}
      SETUP_SECURITY_TOKEN: ${SETUP_SECURITY_TOKEN}
      GROQ_API_KEY: ${GROQ_API_KEY}
      NEO4J_HOST: ${NEO4J_HOST:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD}
      NEO4J_USER: ${NEO4J_USER:-neo4j}
      NEO4J_PORT: ${NEO4J_PORT:-7687}
    depends_on:
      - postgres
      - kafka
      - neo4j
    ports:
      - "3000:3000"
    volumes:
      - ../../backend:/app
    command: uvicorn main:app --host 0.0.0.0 --port 3000 --reload

  ai_worker:
    build:
      context: ../../ai_worker
    container_name: smart_scheduler_ai_worker
    restart: unless-stopped
    # Increased shared memory for AI workloads (e.g. multiprocessing, large NumPy arrays, or other /dev/shm users).
    # Make this configurable to avoid surprising resource requirements in constrained environments.
    shm_size: ${AI_WORKER_SHM_SIZE:-2gb}
    environment:
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      DATABASE_URL: "postgresql+psycopg2://${DB_USER}:${DB_PASSWORD}@${DB_HOST}:${DB_PORT}/${DB_NAME}"
      NEO4J_HOST: ${NEO4J_HOST:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD}
      NEO4J_USER: ${NEO4J_USER:-neo4j}
      NEO4J_PORT: ${NEO4J_PORT:-7687}
      KAFKA_URL: "kafka:29092"
      GA_MAX_WORKERS: ${GA_MAX_WORKERS:-4}
    depends_on:
      - postgres
      - neo4j
      - kafka
    volumes:
      - ../../ai_worker:/app
    command: python worker.py

  # frontend service for the React application
  frontend:
    build:
      context: ../../frontend
    container_name: smart_scheduler_frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    volumes:
      - ../../frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:3000
    depends_on:
      - backend

volumes:
  postgres_data:
  neo4j_data:
